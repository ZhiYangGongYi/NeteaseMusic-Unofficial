<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>逐句歌词</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    #lyric-container {
      width: 100%;
      height: 100%;
      position: relative;
      background: transparent;
    }
    .lyric-content {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 10vh;
      max-height: 6em;
      overflow-y: auto;
      text-align: center;
      font-size: 2.5rem;
      line-height: 1.8;
      color: #fff;
      scroll-behavior: smooth;
      padding: 0 20px;
      z-index: 3;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .lyric-content::-webkit-scrollbar {
      display: none;
    }
    .lyric-line {
      padding: 0.2em 0;
      transition: opacity 0.3s ease;
      white-space: pre-wrap;
      word-break: break-word;
      text-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    .lyric-line.active {
      opacity: 1 !important;
      font-weight: bold;
      color: #f06d6d;
    }
    .lyric-line.near {
      opacity: 0.5 !important;
    }
    .lyric-line:not(.active):not(.near) {
      opacity: 0 !important;
    }
    #visualizer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 30vh;
      z-index: 1;
      pointer-events: none;
      background: transparent;
    }
    
    #song-info {
      position: fixed;
      bottom: 30px;
      left: 30px;
      display: flex;
      align-items: center;
      z-index: 2;
    }
    #song-cover {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      transition: opacity 0.3s ease;
    }
    #song-cover.transparent {
      opacity: 0;
    }
    #song-title {
      margin-left: 15px;
      color: #fff;
      font-size: 1.8rem;
      font-weight: 500;
      max-width: calc(100vw - 200px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 0 5px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div id="lyric-container">
    <div class="lyric-content" id="lyric-content">
    </div>
    <canvas id="visualizer"></canvas>
    
    <div id="song-info">
      <img id="song-cover" class="transparent" src="" alt="Song Cover">
      <span id="song-title"></span>
    </div>
  </div>
  <script src="../js/lyric.js"></script>
</body>
</html>
