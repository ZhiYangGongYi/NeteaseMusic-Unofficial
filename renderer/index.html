<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>网易云音乐</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div id="titlebar">
    <div id="titlebar-drag">
      <span id="app-title">网易云音乐</span>
    </div>
    <div id="titlebar-controls">
      <button id="minimize-btn"><i class="fas fa-window-minimize"></i></button>
      <button id="maximize-btn"><i class="fas fa-window-maximize"></i></button>
      <button id="close-btn"><i class="fas fa-times"></i></button>
    </div>
  </div>
<div id="app">
  <div id="main-row">
  <aside class="sidebar">
    <nav class="nav">
      <ul>
        <li class="active" data-view="home"><i class="fas fa-home"></i> 首页</li>
        <li data-view="discover"><i class="fas fa-compass"></i> 发现</li>
        <li data-view="playlist"><i class="fas fa-list"></i> 歌单</li>
        <li data-view="search"><i class="fas fa-search"></i> 搜索</li>
        <li data-view="profile"><i class="fas fa-user"></i> 我的</li>
      </ul>
    </nav>
    <div class="user-info">
      <img id="avatar" src="assets/default-avatar.png" alt="avatar">
      <span id="nickname">未登录</span>
      <button id="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </aside>

  <main class="main-content">
    <header class="header">
      <h2 id="current-view-title">首页</h2>
      <div class="header-right">
        <input type="text" id="global-search" placeholder="搜索音乐...">
        <button id="search-btn"><i class="fas fa-search"></i></button>
      </div>
    </header>
    <div id="content-view" class="content-view"></div>
  </main>
  </div>

  <footer class="player-bar">
    <div class="player-info">
      <img id="player-cover" src="assets/default-cover.png" alt="cover">
      <div>
        <div id="player-title">未播放</div>
        <div id="player-artist"></div>
      </div>
    </div>
    <div class="player-controls">
      <button id="prev-btn"><i class="fas fa-step-backward"></i></button>
      <button id="play-pause-btn"><i class="fas fa-play"></i></button>
      <button id="next-btn"><i class="fas fa-step-forward"></i></button>
    </div>
    <div class="player-progress">
      <span id="current-time">0:00</span>
      <input type="range" id="progress-slider" value="0" min="0" max="100">
      <span id="duration">0:00</span>
    </div>
    <div class="player-mode">
    <div class="player-lyric"><button id="lyric-btn" title="显示歌词"><i class="fas fa-file-alt"></i></button></div>
      <button id="mode-btn" title="播放模式"><i class="fas fa-repeat"></i></button>
    </div>
    <div class="player-volume">
      <i class="fas fa-volume-up"></i>
      <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
    </div>
  </footer>
</div>

<div id="login-modal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>登录</h2>
    <div class="login-tabs">
      <button class="tab-link active" data-tab="phone">手机</button>
      <button class="tab-link" data-tab="email">邮箱</button>
      <button class="tab-link" data-tab="qr">二维码</button>
      <button class="tab-link" data-tab="captcha">验证码</button>
    </div>
    <div id="phone-tab" class="tab-content active">
      <input type="text" id="phone" placeholder="手机号">
      <input type="password" id="password-phone" placeholder="密码">
      <input type="text" id="countrycode" placeholder="国家码" value="86">
      <button id="login-phone-btn">登录</button>
    </div>
    <div id="email-tab" class="tab-content">
      <input type="email" id="email" placeholder="邮箱">
      <input type="password" id="password-email" placeholder="密码">
      <button id="login-email-btn">登录</button>
    </div>
    <div id="qr-tab" class="tab-content">
      <div id="qr-container">
        <img id="qr-image" src="" alt="二维码">
        <p id="qr-status">等待扫码...</p>
      </div>
    </div>
    <div id="captcha-tab" class="tab-content">
      <input type="text" id="captcha-phone" placeholder="手机号">
      <div style="display: flex; gap: 10px;">
        <input type="text" id="captcha-countrycode" placeholder="国家码" value="86" style="width: 80px;">
        <input type="text" id="captcha-code" placeholder="验证码" style="flex:1;">
        <button id="get-captcha-btn">获取验证码</button>
      </div>
      <button id="login-captcha-btn">登录</button>
    </div>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/renderer.js"></script>
</body>
</html>
  <div class="lyric-content" id="lyric-content">
    <div class="lyric-line" data-time="0">暂无歌词</div>
  </div>
</div>
